name: Genera versioni LeenO con WebDAV

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  generate_version:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup ambiente
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          pip install requests
          mkdir -p src/Ultimus.oxt include tools/version

      - name: Recupera elenco .oxt da WebDAV
        id: webdav_files
        run: |
          # Configurazione da secret
          WEBDAV_URL="${{ secrets.WEBDAV_URL }}"
          WEBDAV_PATH="${{ secrets.STTP_REMOTE_PATH }}"
          AUTH="$(echo -n ${{ secrets.WEBDAV_USER }}:${{ secrets.WEBDAV_PASS }} | base64)"

          if [ -z "$WEBDAV_URL" ] || [ -z "$WEBDAV_PATH" ]; then
            echo "❌ Errore: WEBDAV_URL o STTP_REMOTE_PATH non impostati."
            echo "  WEBDAV_URL vuoto: $([ -z \"$WEBDAV_URL\" ] && echo 'sì' || echo 'no')"
            echo "  WEBDAV_PATH vuoto: $([ -z \"$WEBDAV_PATH\" ] && echo 'sì' || echo 'no')"
            exit 1
          fi

          echo "=== Connessione a ${WEBDAV_URL}/${WEBDAV_PATH} ==="
          
          # 1. Lista file via PROPFIND
          HTTP_CODE=$(curl -s -w "%{http_code}" -X PROPFIND \
            -H "Authorization: Basic $AUTH" \
            -H "Depth: 1" \
            "${WEBDAV_URL}/${WEBDAV_PATH}/" \
            -o webdav.xml)

          echo "=== HTTP response code: $HTTP_CODE ==="
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 400 ]; then
            echo "❌ Errore: WebDAV ha risposto con codice $HTTP_CODE"
            cat webdav.xml || true
            exit 1
          fi

          # 2. Estrai solo file .oxt (|| true per evitare exit 1 se nessun match)
          grep -Eo '<d:href>[^<]*\.oxt</d:href>' webdav.xml | 
            sed 's|<d:href>\(.*\)</d:href>|\1|' > oxt_urls.txt || true

          if [ ! -s oxt_urls.txt ]; then
            echo "⚠️ Nessun file .oxt trovato su WebDAV. Creazione file vuoto."
            touch oxt_list.txt
            echo "count=0" >> $GITHUB_OUTPUT
            echo "list_path=${GITHUB_WORKSPACE}/oxt_list.txt" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 3. Recupera metadati
          echo "=== Metadati file ==="
          while read -r path; do
            filename=$(basename "$path")
            curl -s -I -H "Authorization: Basic $AUTH" "${WEBDAV_URL}${path}" | \
              awk -v fn="$filename" \
              '/Last-Modified:/ {date=$3" "$4" "$5} /Content-Length:/ {size=$2/1024} END {print date, size"KB", fn}'
          done < oxt_urls.txt | sort -r | head -10 > oxt_list.txt

          # Output
          OXT_COUNT=$(grep -c '.oxt' oxt_list.txt || echo 0)
          echo "count=$OXT_COUNT" >> $GITHUB_OUTPUT
          echo "list_path=${GITHUB_WORKSPACE}/oxt_list.txt" >> $GITHUB_OUTPUT
          echo "=== Trovati $OXT_COUNT file ==="
          cat oxt_list.txt

      - name: Genera file versione
        run: python tools/version/leeno_version_generator.py
        env:
          GITHUB_SHA: ${{ github.sha }}
          BUILD_NUMBER: ${{ github.run_number }}
          OXT_LIST_PATH: ${{ github.workspace }}/oxt_list.txt
          OXT_BASE_URL: "${{ secrets.WEBDAV_URL }}/${{ secrets.STTP_REMOTE_PATH }}"
          PUBLIC_DOWNLOAD_URL: "${{ secrets.PUBLIC_DOWNLOAD_BASE }}"

      - name: Verifica output
        run: |
          echo "=== File generati ==="
          ls -la src/Ultimus.oxt/leeno_version_code include/version.h tools/version/versions.html
          echo "=== Anteprima HTML ==="
          grep -A 15 "Archivio Versioni" tools/version/versions.html || true

      - name: Upload a WebDAV
        if: steps.webdav_files.outputs.count > 0
        run: |
          AUTH="$(echo -n ${{ secrets.WEBDAV_USER }}:${{ secrets.WEBDAV_PASS }} | base64)"
          for file in src/Ultimus.oxt/leeno_version_code include/version.h tools/version/versions.html; do
            curl -X PUT \
              -H "Authorization: Basic $AUTH" \
              -T "$file" \
              "${{ secrets.WEBDAV_URL }}/${{ secrets.STTP_REMOTE_PATH }}/$(basename $file)"
          done
          
      - name: Debug WebDAV
        run: |
          WEBDAV_URL="${{ secrets.WEBDAV_URL }}"
          WEBDAV_USER="${{ secrets.WEBDAV_USER }}"
          WEBDAV_PASS="${{ secrets.WEBDAV_PASS }}"
          WEBDAV_PATH="${{ secrets.STTP_REMOTE_PATH }}"

          if [ -z "$WEBDAV_URL" ] || [ -z "$WEBDAV_USER" ] || [ -z "$WEBDAV_PASS" ] || [ -z "$WEBDAV_PATH" ]; then
            echo "❌ Errore: Variabili WebDAV (URL, User, Pass, Path) non impostate per il debug."
            exit 1
          fi

          AUTH="$(echo -n "$WEBDAV_USER:$WEBDAV_PASS" | base64)"

          echo "URL: $WEBDAV_URL/$WEBDAV_PATH"
          echo "File list:"
          curl -s -X PROPFIND -H "Authorization: Basic $AUTH" \
            "$WEBDAV_URL/$WEBDAV_PATH/" | grep -Eo '<d:href>[^<]*</d:href>'
