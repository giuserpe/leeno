name: Mirror dev → GitLab

on:
  push:
    branches:
      - dev

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # storia completa, necessaria per il push
          ref: dev

      - name: Push mirror su GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/giuserpe/leeno.git
          git push gitlab dev --force
