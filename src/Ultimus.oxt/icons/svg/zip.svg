<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="32"
   height="32"
   viewBox="0 0 32 32"
   version="1.1"
   id="svg_zip"
   xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Box -->
  <rect x="5" y="5" width="22" height="22" rx="2" fill="#ffffff" stroke="#1a2010" stroke-width="2" />
  <!-- Flaps of the box/folder top -->
  <path d="M 5,11 L 27,11" stroke="#1a2010" stroke-width="2" />
  <!-- Zipper elements / teeth -->
  <line x1="16" y1="11" x2="16" y2="27" stroke="#1a2010" stroke-width="2" stroke-dasharray="2,2" />
  <!-- Zipper pull (red) -->
  <rect x="14" y="14" width="4" height="6" fill="#ff4d2e" stroke="#1a2010" stroke-width="1.5" rx="0.5" />
</svg>
